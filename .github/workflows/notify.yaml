name: PushPlus Notify

on:
  schedule:
    # 每小时执行一次
    # GitHub 用 UTC 时区，比北京时间晚8个小时
    - cron: '31 04 * * 2,5,6,0'

  # 允许手动运行（方便测试）
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # - run: pip install requests bs4 supabase
      # 缓存 pip 依赖, 减少Action执行时间
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r python/requirements.txt

      - name: Send notification
        env:
          MESSAGE_TOKEN: ${{ secrets.MESSAGE_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FRIENDS_TOKEN: ${{ secrets.FRIENDS_TOKEN }}
        run: python python/download-cartoon.py
